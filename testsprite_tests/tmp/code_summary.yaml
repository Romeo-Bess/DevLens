version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Tailwind CSS v4
  - Zustand
  - React Router
  - Recharts
  - React Flow
routes:
  - path: /
    file: src/features/landing/LandingPage.tsx
    auth_required: false
    description: DevLens landing page and interactive sandbox simulator
  - path: /dashboard
    file: src/features/dashboard/DashboardView.tsx
    auth_required: false
    description: Main bento diagnostics metrics dashboard
  - path: /repositories
    file: src/features/repositories/RepositoriesView.tsx
    auth_required: false
    description: Connected repository connection list
  - path: /architecture
    file: src/features/architecture/ArchitectureView.tsx
    auth_required: false
    description: System architecture flow graphs visualizer
  - path: /dependencies
    file: src/features/dependencies/DependencyView.tsx
    auth_required: false
    description: Package manifests dependency explorer
  - path: /tech-debt
    file: src/features/tech-debt/TechDebtView.tsx
    auth_required: false
    description: Maintenance metrics and refactoring targets logs
  - path: /security
    file: src/features/security/SecurityView.tsx
    auth_required: false
    description: Active CVE audits and secret scan logs
  - path: /docs
    file: src/features/docs/DocumentationView.tsx
    auth_required: false
    description: Generated markdown system guides previewer
  - path: /ai-assistant
    file: src/features/ai-assistant/AIAssistantView.tsx
    auth_required: false
    description: Contextual AI assistant chat console
features:
  - name: Codebase Diagnostics Simulator
    description: Simulates full metrics checks on landing page public URL inputs
    files:
      - src/features/landing/LandingPage.tsx
    entry_route: /
    user_interactions:
      - Type repository URL inside input field
      - Click 'Run Diagnostics' submit button
      - Review health rating and parsed lines statistics
    api_calls: []
    auth_required: false
  - name: Connected Repositories Manager
    description: Manage connected workspaces and trigger diagnostic scans
    files:
      - src/features/repositories/RepositoriesView.tsx
      - src/store/repoStore.ts
    entry_route: /repositories
    user_interactions:
      - Fill repository URL inside search input
      - Click 'Connect Repo' submit button
      - Click 'Set active repo' to update workspace context
    api_calls: []
    auth_required: false
  - name: Architecture Graph Visualizer
    description: Interactive systems graph viewer supporting panning and property overlays
    files:
      - src/features/architecture/ArchitectureView.tsx
    entry_route: /architecture
    user_interactions:
      - Drag canvas to pan the architecture graph
      - Click zoom buttons on controls panel
      - Click individual system nodes to open specifications drawer
      - Click 'Export JSON' to download schema parameters
    api_calls: []
    auth_required: false
known_limitations: []
